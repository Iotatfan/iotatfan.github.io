<!doctype html>
<html lang="">
  <head>
    <!-- Primary -->
    <meta charset="utf-8" />

      http-equiv="X-UA-Compatible"
      content="IE=edge"
    />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1.0"
    />

    <!-- Open Graph / Facebook -->
    <meta
      property="og:title"
      content="Iqbal Imani – Frontend Developer"
    />
    <meta
      property="og:description"
      content="Frontend Developer with Full-Stack & QA experience. React, Vue, Go, PostgreSQL, Playwright, and deployed production projects."
    />
    <meta
      property="og:type"
      content="website"
    />

      property="og:url"
      content="https://iotatfan.com"
    />

    <!-- Twitter -->
    <meta
      name="twitter:card"
      content="summary_large_image"
    />
    <meta
      name="twitter:title"
      content="Muhammad Iqbal Imani Atfan – Frontend Developer"
    />
    <meta
      name="twitter:description"
      content="Frontend Developer with Full-Stack & QA experience. React, Vue, Go, PostgreSQL, Playwright, and deployed production projects."
    />
    <!-- <meta name="twitter:image" content="https://iotatfan.com/og-image.png" /> -->

    <link
      rel="icon"
      href="<%= BASE_URL %>favicon.png"
    />
    <title>Iqbal Imani Atfan | Frontend Developer</title>
    <meta
      name="description"
      content="Frontend Developer with Full-Stack & QA experience. React, Vue, Go, PostgreSQL, Playwright, and deployed production projects."
    />
